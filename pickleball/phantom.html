   <!-- ✅ Flash Banner -->
<div id="flashbanner-placeholder"></div>
<script>
  fetch("/html/flashsalebanner/freeship.html")
    .then(res => res.text())
    .then(html => {
      // inject cả HTML + JS bên trong file phantom.html
      document.getElementById("flashbanner-placeholder").innerHTML = html;

      // tìm và chạy các <script> trong nội dung vừa inject
      const tempDiv = document.createElement("div");
      tempDiv.innerHTML = html;
      tempDiv.querySelectorAll("script").forEach(oldScript => {
        const newScript = document.createElement("script");
        if (oldScript.src) {
          newScript.src = oldScript.src; // nếu script có src thì load
        } else {
          newScript.textContent = oldScript.textContent; // nếu script inline thì chạy luôn
        }
        document.body.appendChild(newScript);
      });
    });
</script>

<!-- ✅ KHỐI 2: Reviews -->

    </div>
    <script>
  fetch("/html/reviewblock/pickleball-phantom.html")
    .then(res => res.text())

      container.innerHTML = html;

<!-- HẾT KHỐI 2: review -->
    <!-- ✅ FreeFlow -->

    <script src="/js/freeflow-loader.js"></script>

  </div>

  <!-- ✅ Inject popup + footer -->
  <script>
    async function loadScript(src) {
      return new Promise(resolve => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        document.body.appendChild(s);
      });
    }

    async function injectHTML(file, placeholderId) {
      const res = await fetch(file);
      const html = await res.text();
      const container = document.getElementById(placeholderId);
      const temp = document.createElement("div");
      temp.innerHTML = html;

      Array.from(temp.children).forEach(el => {
        if (el.tagName === "SCRIPT") {
          const script = document.createElement("script");
          if (el.src) {
            script.src = el.src;
            script.async = false;
          } else {
            script.textContent = el.textContent;
          }
          document.body.appendChild(script);
        } else {
          container.appendChild(el);
        }
      });
    }

    async function setupPage() {
      await injectHTML("/html/cartpopup.html", "cartPopup-placeholder");
      await injectHTML("/html/checkoutpopup.html", "checkoutPopup-placeholder");
      await injectHTML("/html/stickyfooter.html", "sticky-footer-placeholder");

      await loadScript("https://friendly-kitten-d760ff.netlify.app/js/voucherpopup.js");
      await loadScript("https://friendly-kitten-d760ff.netlify.app/js/cartpopup-3p.js");
      await loadScript("https://friendly-kitten-d760ff.netlify.app/js/checkoutpopup.js");

      setTimeout(async () => {
        const map = await fetchVoucherMap();
        window.__vouchersRaw = map[window.loai] || {};
        window.voucherByProduct = {};
        initCartPopup();
      }, 100);
    }

    setupPage();
  </script>

  <!-- ✅ Tracking -->
  <script src="https://friendly-kitten-d760ff.netlify.app/js/tracking.js"></script>
  <div id="base-placeholder"></div>
  <script>
    fetch("/html/base.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("base-placeholder").outerHTML = html;
        if (typeof trackBothPixels === "function") {
          trackBothPixels("ViewContent", {
            content_id: window.productPage,
            content_name: window.productPage,
            content_category: window.productCategory,
            value: 0,
            currency: "VND"
          });
        }
      });
  </script>

<script>
  function closeVoucherPopup() {
    const popup = document.getElementById("voucherPopup");
    if (popup) popup.style.display = "none";
  }
</script>
  <!-- ✅ Base script -->

</body>
