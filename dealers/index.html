<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="F-Sport Dealer - Đăng nhập đại lý">
  <title>Đăng nhập | F-Sport Dealer</title>

  <link rel="icon" href="./assets/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/pages.css">
  <link rel="stylesheet" href="./css/responsive.css">
</head>
<body data-page="login" class="auth-page">

  <header class="site-header">
    <div class="container">
      <div id="headerLogo" class="logo"></div>
      <nav class="nav-links">
        <a href="./register.html" class="btn btn-outline btn-sm">Đăng ký</a>
      </nav>
    </div>
  </header>

  <main class="auth-container">
    <div class="auth-card">
      <h1>Đăng nhập</h1>
      <p class="subtitle">Truy cập trang quản lý đơn hàng đại lý</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="loginEmail">
            Email <span class="required">*</span>
          </label>
          <input
            type="email"
            id="loginEmail"
            name="email"
            class="form-control"
            autocomplete="email"
            placeholder="dealer@example.com"
            required>
          <span class="form-error" data-error="email"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">
            Mật khẩu <span class="required">*</span>
          </label>
          <input
            type="password"
            id="loginPassword"
            name="password"
            class="form-control"
            autocomplete="current-password"
            placeholder="Nhập mật khẩu"
            required>
          <span class="form-error" data-error="password"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">
          Đăng nhập
        </button>
      </form>

      <p class="auth-footer-link">
        Chưa có tài khoản? <a href="./register.html">Đăng ký ngay</a>
      </p>
    </div>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
