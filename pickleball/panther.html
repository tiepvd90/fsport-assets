  <!-- ✅ JS định nghĩa -->
  <script>
    function fsportProductSlugFromPath(path) {
      var clean = String(path || "").split("?")[0].split("#")[0].replace(/\/+$/, "");
      var last = clean.split("/").filter(Boolean).pop() || "";
      return last.replace(/\.html?$/i, "").trim().toLowerCase();
    }

    window.loai = "pickleball";
    window.productCategory = "pickleball";
    window.productPage = fsportProductSlugFromPath(window.location.pathname);
    window.imageCount = 8;
    window.imageFormat = "webp";
    window.FSPORT_CARTPOPUP_CONFIG_URL = window.FSPORT_CARTPOPUP_CONFIG_URL ||
      "https://xcigbbcpwfzluqazadez.supabase.co/functions/v1/cart-popup-config";

      "https://xcigbbcpwfzluqazadez.supabase.co/functions/v1/product-page-config";

  </script>

  <!-- ✅ Inject popup + footer -->
  <script>
    async function loadScript(src) {
      return new Promise(resolve => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        document.body.appendChild(s);
      });
    }

    async function injectHTML(file, placeholderId) {
      const res = await fetch(file);
      const html = await res.text();
      const container = document.getElementById(placeholderId);
      const temp = document.createElement("div");
      temp.innerHTML = html;

      Array.from(temp.children).forEach(el => {
        if (el.tagName === "SCRIPT") {
          const script = document.createElement("script");
          if (el.src) {
            script.src = el.src;
            script.async = false;
          } else {
            script.textContent = el.textContent;
          }
          document.body.appendChild(script);
        } else {
          container.appendChild(el);
        }
      });
    }

    async function setupPage() {
      await injectHTML("/html/cartpopup.html", "cartPopup-placeholder");
      await injectHTML("/html/checkoutpopup.html", "checkoutPopup-placeholder");
      await injectHTML("/html/stickyfooter.html", "sticky-footer-placeholder");
      await loadScript("/js/voucherpopup.js");
      await loadScript("/js/cartpopup.js?v=20260702-admin-first-1");
      await loadScript("/js/checkoutpopup.js?v=20260701-desktop-promo-off-1");

      setTimeout(async () => {
        const map = await fetchVoucherMap();
        window.__vouchersRaw = map[window.loai] || {};
        window.voucherByProduct = {};
        initCartPopup();
      }, 100);
    }

    setupPage();
  </script>

        if (typeof trackBothPixels === "function") {

              content_category: window.productCategory,

            currency: "VND"

      });
