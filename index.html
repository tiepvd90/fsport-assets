<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0,
                 maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <title>Fun Sport</title>
  <link rel="icon" type="image/png" href="/favicon.png" />

  <link rel="stylesheet" href="/css/frontend.css?v=20260701-central-css-1">

  <script>
    window.productPage = "homepage";
  </script>
  <script src="/js/slideshow-lazy-loader.js?v=20260701-1"></script>
  <script src="/js/frontend-page-runtime.js?v=20260701-homepage-section-order-2"></script>

  <script src="/js/voucherpopup.js" defer></script>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RXC205951M"></script>
  <script>
    window.productCategory = "pickleball";
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-RXC205951M');
  </script>

</head>

<body>

  <!-- Cover banner -->
  <div id="homepageBanner"></div>

  <!-- Slideshow -->
  <div id="homepageSlideshow"></div>

  <!-- ========================================================= -->
  <!--  🔥 COLLECTION GRID — PICKLEBALL + Y-SANDAL               -->
  <!-- ========================================================= -->
  <div id="collectionContainer"></div>
  <script>
    window.collectionList = [
      {
        title: "PICKLEBALL COLLECTION",
        json: "/json/pickleball-collection.json"
      },
      {
        title: "DÉP CHẠY Y-SANDAL ĐÀI LOAN",
        json: "/json/ysandal-collection.json"
      }
    ];
  </script>
  <script src="/js/collection-grid.js?v=20260702-discount-badge-1" defer></script>

  <!-- ✅ AI TƯ VẤN -->
  <div id="aic-container" class="idx-section"></div>

  <!-- ========================================================= -->
  <!--  📸 PHOTO GALLERY (FSPORT CLUB)                           -->
  <!-- ========================================================= -->
  <div id="photo-gallery-container" class="gallery-wrapper idx-section"></div>

  <!-- ========================================================= -->
  <!--  CHECKOUT POPUP                                           -->
  <!-- ========================================================= -->
  <div id="checkoutPopup-placeholder"></div>
  <script>
    fetch("/html/checkoutpopup.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("checkoutPopup-placeholder").innerHTML = html;
        const script = document.createElement("script");
        script.src = "/js/checkoutpopup.js?v=20260701-desktop-promo-off-1";
        document.body.appendChild(script);
      });
  </script>

  <!-- ========================================================= -->
  <!--  ℹ️  ABOUT / ACCORDION SECTION                            -->
  <!-- ========================================================= -->
  <div id="about-placeholder" class="idx-section"></div>
  <script src="/js/about.js"></script>

  <!-- BASE JS & PHOTO GALLERY JS (cuối body) -->
  <script src="/js/base.js?v=20260701-centered-1" defer></script>
  <script src="/js/photo-gallery.js?v=20260701-lazy-images-1"></script>

  <!-- ✅ HOMEPAGE NAV FOOTER (Shop | Feed) — chỉ hiện trên homepage và /feed -->
  <script src="/js/homepage-footer.js?v=20260701-desktop-text-1" defer></script>

</body>
</html>
