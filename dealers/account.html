<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Thông tin tài khoản - F-Sport Dealer">
  <title>Thông Tin Tài Khoản | F-Sport Dealer</title>

  <link rel="icon" href="./assets/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/pages.css">
  <link rel="stylesheet" href="./css/responsive.css">
</head>
<body data-page="account">

<header class="site-header">
  <div class="container">
    <div class="dashboard-header">
      <div id="headerLogo" class="logo"></div>
      <div id="dashboardWelcome" class="dashboard-welcome">
        Xin chào
      </div>
      <div class="dashboard-actions">
        <button id="logoutBtn" class="btn btn-outline btn-sm" type="button" title="Đăng xuất">
          Đăng xuất
        </button>
      </div>
      <div class="header-menu-dropdown">
        <a href="./dashboard.html" class="btn btn-ghost btn-sm" title="Tạo đơn hàng">
          Tạo Đơn
        </a>
        <a href="./order-history.html" class="btn btn-ghost btn-sm" title="Lịch sử đơn hàng">
          Lịch Sử Đơn Hàng
        </a>
        <a href="./account.html" class="btn btn-ghost btn-sm" title="Thông tin tài khoản">
          Thông Tin Tài Khoản
        </a>
      </div>
    </div>
  </div>
</header>

<main class="site-main">
  <div class="container-wide">
    <section class="dashboard-section">
      <!-- THÔNG TIN ĐẠI LÝ -->
      <div class="dashboard-section-header">
        <h2>Thông Tin Tài Khoản</h2>
      </div>
      <div class="dashboard-section-body">
        <form id="accountForm" novalidate>
          <div class="form-group">
            <label class="form-label">Email <span class="required">*</span></label>
            <input type="email" id="accEmail" class="form-control" readonly style="background-color: var(--gray-100); cursor: not-allowed;">
            <span class="form-hint">Email không thể thay đổi</span>
          </div>

          <div class="form-group">
            <label class="form-label">Tên Đại Lý <span class="required">*</span></label>
            <input type="text" id="accFullname" name="fullname" class="form-control" placeholder="Tên đại lý" required>
            <span class="form-error" data-error="fullname"></span>
          </div>

          <div class="form-group">
            <label class="form-label">Số Điện Thoại <span class="required">*</span></label>
            <input type="tel" id="accPhone" name="phone" class="form-control" placeholder="0901234567" required>
            <span class="form-error" data-error="phone"></span>
          </div>

          <div class="form-group">
            <label class="form-label">Địa Chỉ Nhận Hàng <span class="required">*</span></label>
            <textarea id="accAddress" name="address" class="form-control" placeholder="Số nhà, đường, phường, quận, tỉnh..." rows="3" required></textarea>
            <span class="form-error" data-error="address"></span>
          </div>

          <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <button type="submit" class="btn btn-primary">
              Lưu Thay Đổi
            </button>
            <button type="button" id="accountCancel" class="btn btn-ghost">
              Hủy
            </button>
          </div>
        </form>
      </div>
    </section>

    <!-- ĐỔI MẬT KHẨU -->
    <section class="dashboard-section" style="margin-top: 2rem;">
      <div class="dashboard-section-header">
        <h2>Đổi Mật Khẩu</h2>
      </div>
      <div class="dashboard-section-body">
        <form id="passwordForm" novalidate>
          <div class="form-group">
            <label class="form-label">Mật Khẩu Hiện Tại <span class="required">*</span></label>
            <input type="password" id="currentPassword" class="form-control" placeholder="Nhập mật khẩu hiện tại" required>
            <span class="form-error" data-error="currentPassword"></span>
          </div>

          <div class="form-group">
            <label class="form-label">Mật Khẩu Mới <span class="required">*</span></label>
            <input type="password" id="newPassword" class="form-control" placeholder="Nhập mật khẩu mới (tối thiểu 6 ký tự)" required>
            <span class="form-error" data-error="newPassword"></span>
          </div>

          <div class="form-group">
            <label class="form-label">Xác Nhận Mật Khẩu <span class="required">*</span></label>
            <input type="password" id="confirmPassword" class="form-control" placeholder="Xác nhận mật khẩu mới" required>
            <span class="form-error" data-error="confirmPassword"></span>
          </div>

          <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <button type="submit" class="btn btn-primary">
              Đổi Mật Khẩu
            </button>
            <button type="button" id="passwordCancel" class="btn btn-ghost">
              Hủy
            </button>
          </div>
        </form>
      </div>
    </section>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-content">
    <p class="footer-contact">Liên Hệ: SĐT/ZALO 0384735980</p>
    <div class="footer-links">
      <p>Website: <a href="https://fun-sport.co" target="_blank">fun-sport.co</a></p>
      <p>Facebook: <a href="https://web.facebook.com/funsport1" target="_blank">facebook.com/funsport1</a></p>
    </div>
    <p>&copy; 2026 F-Sport Pickleball. All rights reserved.</p>
  </div>
</footer>

<script type="module" src="./js/app.js"></script>
<script type="module" src="./js/pages/account.js"></script>
</body>
</html>
