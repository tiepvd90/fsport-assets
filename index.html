<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0,
                 maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <title>Fun Sport</title>
  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- CSS chung -->
  <link rel="stylesheet" href="/stories/css/stories.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/photo-gallery.css">
  <link rel="stylesheet" href="/css/collection-grid.css">
  <link rel="stylesheet" href="/css/about.css">

  <!-- Popup CSS -->
  <link rel="stylesheet" href="https://friendly-kitten-d760ff.netlify.app/css/checkoutpopup.css" />
  <link rel="stylesheet" href="https://friendly-kitten-d760ff.netlify.app/css/voucherpopup.css" />

  <script>
    window.productPage = "homepage";
  </script>

  <script src="https://friendly-kitten-d760ff.netlify.app/js/voucherpopup.js" defer></script>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RXC205951M"></script>
  <script>
    window.productCategory = "pickleball";
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-RXC205951M');
  </script>

  <style>
    body {
      background-color: #f9f9f9;
      margin: 0;
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    /* ── Chuẩn chung: tất cả section canh giữa, max 1200px, padding 16px 2 bên ── */
    .idx-section {
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      padding-left: 16px;
      padding-right: 16px;
      box-sizing: border-box;
    }

    .cover-img {
      display: block;
      width: 100%;
      max-width: 1080px;
      margin: 8px auto 0;
      border-radius: 12px;
    }

    @media screen and (max-width: 600px) {
      .cover-img {
        padding: 0 12px;
        box-sizing: border-box;
      }
    }

    #aic-container  { margin-top: 16px; margin-bottom: 16px; }
    .gallery-wrapper { margin-top: 50px; margin-bottom: 50px; }
  </style>
</head>

<body>

  <!-- Cover -->
  <img src="/assets/images/F-SPORT COVER.webp"
       alt="Fun Sport Cover"
       class="cover-img" />

  <!-- ========================================================= -->
  <!--  🔥 COLLECTION GRID — PICKLEBALL + Y-SANDAL               -->
  <!-- ========================================================= -->
  <div id="collectionContainer"></div>
  <script>
    window.collectionList = [
      {
        title: "PICKLEBALL COLLECTION",
        json: "/json/pickleball-collection.json"
      },
      {
        title: "DÉP CHẠY Y-SANDAL ĐÀI LOAN",
        json: "/json/ysandal-collection.json"
      }
    ];
  </script>
  <script src="/js/collection-grid.js" defer></script>

  <!-- ✅ AI TƯ VẤN -->
  <div id="aic-container" class="idx-section"></div>

  <!-- ========================================================= -->
  <!--  📸 PHOTO GALLERY (FSPORT CLUB)                           -->
  <!-- ========================================================= -->
  <div id="photo-gallery-container" class="gallery-wrapper idx-section"></div>

  <!-- ========================================================= -->
  <!--  CHECKOUT POPUP                                           -->
  <!-- ========================================================= -->
  <div id="checkoutPopup-placeholder"></div>
  <script>
    fetch("/html/checkoutpopup.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("checkoutPopup-placeholder").innerHTML = html;
        const script = document.createElement("script");
        script.src = "https://friendly-kitten-d760ff.netlify.app/js/checkoutpopup.js";
        document.body.appendChild(script);
      });
  </script>

  <!-- ========================================================= -->
  <!--  ℹ️  ABOUT / ACCORDION SECTION                            -->
  <!-- ========================================================= -->
  <div id="about-placeholder" class="idx-section"></div>
  <script src="/js/about.js"></script>

  <!-- BASE JS & PHOTO GALLERY JS (cuối body) -->
  <script src="/js/base.js" defer></script>
  <script src="/js/photo-gallery.js"></script>

</body>
</html>
