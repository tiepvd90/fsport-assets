<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>F-Sport</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/css/frontend.css?v=20260702-dynamic-product-1">
  <script>
    (function () {
      var parts = location.pathname.split("/").filter(Boolean);
      var last = parts[parts.length - 1] || "";
      window.loai = (parts.length > 1 ? parts[parts.length - 2] : "product").toLowerCase();
      window.productCategory = window.loai;
      window.productPage = last.replace(/\.html?$/i, "").trim().toLowerCase();
      window.FSPORT_DYNAMIC_PRODUCT_PAGE = true;
      window.FSPORT_CARTPOPUP_CONFIG_URL = "https://xcigbbcpwfzluqazadez.supabase.co/functions/v1/cart-popup-config";
      window.FSPORT_PRODUCT_PAGE_CONFIG_URL = "https://xcigbbcpwfzluqazadez.supabase.co/functions/v1/product-page-config";
    })();
  </script>
  <script src="/js/product-page-runtime.js?v=20260702-dynamic-page-1"></script>
</head>
<body>
  <div class="page-container">
    <div id="cartPopup-placeholder"></div>
    <div id="checkoutPopup-placeholder"></div>
    <div id="sticky-footer-placeholder"></div>

    <div id="productPageSections">
      <div data-fsport-section="slideshow">
        <div class="lazy-slideshow" id="lazySlideshow">
          <div class="slide-counter" id="slideCounter">1/1</div>
        </div>
        <div id="fullscreenZoom" class="fs-hidden-initial">
          <div id="zoomWrapper">
            <img id="zoomedImg" src="" alt="Ảnh phóng to">
            <button id="zoomCloseBtn" type="button" aria-label="Đóng">×</button>
          </div>
        </div>
      </div>
      <script src="/js/slideshow-lazy-loader.js?v=20260701-1"></script>
      <script src="/js/slideshow-2p.js?v=20260702-dynamic-page-1"></script>

      <div data-fsport-section="flash_banner"><div id="flashbanner-placeholder"></div></div>

      <div class="product-hero">
        <h1 class="fs-product-title">
          <span class="fs-product-badge fs-product-badge--mall">Mall</span>
          <span class="fs-product-badge fs-product-badge--official">Hàng Chính Hãng</span>
          <span id="dynamicProductTitle">Đang tải sản phẩm...</span>
        </h1>

        <div data-fsport-section="product_video"><div id="video-placeholder"></div></div>
        <script src="/js/productvideo-v3.js?v=20260703-v1-autoplay-5"></script>
        <script>initProductVideo();</script>

        <div data-fsport-section="product_description" class="product-hero">
          <div id="productdescription-placeholder"></div>
        </div>
        <script src="/js/productdescription.js?v=20260630-central-runtime-1"></script>

        <div data-fsport-section="ai_chat"><div id="aic-container"></div></div>
        <div data-fsport-section="photo_gallery" class="product-hero"><div id="photo-gallery-container"></div></div>
        <div data-fsport-section="collection_grid"><div id="collectionContainer"></div></div>
      </div>
    </div>
  </div>

  <script>
    async function loadScript(src) {
      return new Promise(function (resolve, reject) {
        var script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }
    async function injectHTML(file, placeholderId) {
      var response = await fetch(file);
      if (!response.ok) throw new Error(file + " HTTP " + response.status);
      var html = await response.text();
      var container = document.getElementById(placeholderId);
      var temp = document.createElement("div");
      temp.innerHTML = html;
      Array.from(temp.children).forEach(function (element) {
        if (element.tagName === "SCRIPT") {
          var script = document.createElement("script");
          if (element.src) { script.src = element.src; script.async = false; }
          else script.textContent = element.textContent;
          document.body.appendChild(script);
        } else {
          container.appendChild(element);
        }
      });
    }
    async function setupPage() {
      await Promise.all([
        injectHTML("/html/cartpopup.html", "cartPopup-placeholder"),
        injectHTML("/html/checkoutpopup.html", "checkoutPopup-placeholder"),
        injectHTML("/html/stickyfooter.html", "sticky-footer-placeholder")
      ]);
      await loadScript("/js/voucherpopup.js");
      await loadScript("/js/cartpopup.js?v=20260702-admin-first-1");
      await loadScript("/js/checkoutpopup.js?v=20260701-desktop-promo-off-1");
    }
    setupPage().catch(function (error) { console.error("[DynamicProduct] UI setup failed", error); });
    window.FSPORT_PRODUCT_PAGE_CONFIG_PROMISE.then(function (config) {
      if (config) return;
      var title = document.getElementById("dynamicProductTitle");
      if (title) title.textContent = "Không tìm thấy sản phẩm";
    });
  </script>

  <script>window.collectionList = [];</script>
  <script src="/js/collection-grid.js?v=20260702-discount-badge-1" defer></script>
  <script src="/js/tracking.js"></script>
  <div id="base-placeholder"></div>
  <script>
    fetch("/html/base.html").then(function (response) { return response.text(); }).then(function (html) {
      document.getElementById("base-placeholder").outerHTML = html;
    });
  </script>
  <script src="/js/base.js?v=20260701-centered-1"></script>
  <script src="/js/photo-gallery.js?v=20260701-lazy-images-1"></script>
</body>
</html>
