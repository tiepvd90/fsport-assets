<!-- ✅ CHECKOUT POPUP -->
<div id="checkoutPopup" class="hidden" style="display: none;">
  <div class="checkout-overlay" onclick="hideCheckoutPopup()"></div>

  <div class="checkout-content">
    <button class="checkout-close" onclick="hideCheckoutPopup()">&times;</button>

    <div class="checkout-inner-scroll">

      <!-- MỤC 1: DANH SÁCH SẢN PHẨM -->
      <div class="checkout-section-title">1. Danh sách sản phẩm</div>
      <div id="checkoutCartList"></div>
      <div id="emptyCartText" style="display: none; color: #888; font-size: 14px; margin-bottom: 12px;">
        Giỏ hàng của bạn hiện đang trống.
      </div>

      <!-- MỤC 2: THÔNG TIN ĐƠN HÀNG -->
      <div class="checkout-section-title">2. Thông tin đơn hàng</div>
      <div class="checkout-summary">
        <div class="row">
          <span>Tạm tính <span id="itemQuantityText"></span></span>
          <span id="subtotalText">0₫</span>
        </div>

        <div class="row">
          <span>Phí vận chuyển</span>
          <span id="shippingFeeText">0₫</span>
        </div>

        <!-- 🎟️ PROMO CODE: container rỗng, JS sẽ tự tạo button -->
        <div class="row promo-code-wrapper">
          <div id="promoCodeContainer"></div>
        </div>

        <div class="row">
          <span>Voucher</span>
          <span id="voucherText" style="color: red;">-0₫</span>
        </div>

        <div class="row total-row">
          <span>Tổng</span>
          <span id="totalText">0₫</span>
        </div>

        <div class="note">
          <span class="red-dot-icon">💯</span>
          <em>kiểm tra hàng trước khi thanh toán</em>
        </div>
      </div>

      <!-- MỤC 3: THÔNG TIN NGƯỜI NHẬN -->
      <div class="checkout-section-title">3. Thông tin người nhận</div>
      <div class="checkout-form">
        <div class="form-row">
          <input type="text" id="checkoutName" placeholder="Họ và Tên" />
          <input type="tel" id="checkoutPhone" placeholder="Số điện thoại" />
        </div>
        <input type="text" id="checkoutAddress" placeholder="Địa chỉ nhận hàng" />
      </div>

      <button id="checkoutSubmitBtn">ĐẶT HÀNG NGAY</button>
    </div>
  </div>
</div>

<!-- ICON GIỎ HÀNG -->
<div id="cartIcon" onclick="showCheckoutPopup()">
  <svg class="cart-icon-img" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-label="Cart" role="img">
    <path d="M6.5 8.5h11l1 11h-13l1-11Z"></path>
    <path d="M9 9V6.5a3 3 0 0 1 6 0V9"></path>
  </svg>
  <div id="cartItemCount">0</div>
</div>
