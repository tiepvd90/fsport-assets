<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Vợt Pickleball F-Sport FullFOAM Phiên Bản Cờ Đỏ Sao Vàng Viền Metallic Crom Ánh Kim</title>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="/css/frontend.css?v=20260701-central-css-1" />
  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- ✅ JS định nghĩa -->
  <script>
    window.loai = "pickleball";
    window.productCategory = "pickleball";
    window.productPage = "fullfoam-vietnam";
    window.imageCount = 1;
    window.imageFormat = "webp";
  </script>
</head>
<body>

  <div class="page-container">

    <!-- ✅ Placeholders -->
    <div id="cartPopup-placeholder"></div>
    <div id="checkoutPopup-placeholder"></div>
    <div id="sticky-footer-placeholder"></div>

    <!-- ✅ Slideshow chính -->
    <div class="lazy-slideshow" id="lazySlideshow">
      <div class="slide-counter" id="slideCounter">1/1</div>
    </div>

    <!-- Zoom toàn màn hình khi click ảnh -->
    <div id="fullscreenZoom" style="display: none;">
      <div id="zoomWrapper">
        <img id="zoomedImg" src="" alt="Zoomed" />
        <button id="zoomCloseBtn">×</button>
      </div>
    </div>

    <!-- Script xử lý slideshow + zoom -->
    <script src="/js/slideshow-lazy-loader.js?v=20260701-1"></script>
    <script src="/js/slideshow-2p.js?v=20260702-instant-first-slide-1"></script>

    <!-- ✅ Flash Banner -->
    <div id="flashbanner-placeholder"></div>
    <script>
      fetch("/html/flashsalebanner/freeship.html")
        .then(res => res.text())
        .then(html => {
          document.getElementById("flashbanner-placeholder").innerHTML = html;
          const s = document.createElement("script");
          s.src = "/js/flashsalebanner/template01.js";
          document.body.appendChild(s);
        });
    </script>

    <!-- ✅ Tiêu đề + Shipping -->
    <div class="product-hero">
      <h1 style="font-size: 14px; font-weight: bold; margin-top: 8px; font-family: 'Be Vietnam Pro', sans-serif; line-height: 1.4; text-align: left;">
        <span style="background: black; color: white; font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-right: 4px;">Mall</span>
        <span style="background: #007BFF; color: white; font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-right: 6px; text-transform: uppercase;">Hàng Chính Hãng</span>
        Vợt Pickleball F-Sport FullFOAM Phiên Bản Cờ Đỏ Sao Vàng Viền Metallic Crom Ánh Kim
      </h1>

      <!-- ✅ Mô tả sản phẩm -->
      <div class="product-hero" style="margin-top: 12px;">
        <div id="productdescription-placeholder" data-src="/html/productdescription/pickleball/fullfoam-vietnam.html"></div>
      </div>
      <script src="/js/productdescription.js"></script>

      <!-- ✅ KHỐI 2: PHOTO GALLERY (thay thế review cũ) -->
      <div class="product-hero" style="margin-top: 12px;">
        <div id="photo-gallery-container"></div>
      </div>
      <!-- HẾT KHỐI 2: photo-gallery -->

      <!-- ✅ COLLECTION GRID - PICKLEBALL -->
      <div style="margin-top: 32px;">
        <div id="collectionContainer"></div>
      </div>

    </div>

  </div>

  <!-- ✅ Inject popup + footer -->
  <script>
    async function loadScript(src) {
      return new Promise(resolve => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        document.body.appendChild(s);
      });
    }

    async function injectHTML(file, placeholderId) {
      const res = await fetch(file);
      const html = await res.text();
      const container = document.getElementById(placeholderId);
      const temp = document.createElement("div");
      temp.innerHTML = html;

      Array.from(temp.children).forEach(el => {
        if (el.tagName === "SCRIPT") {
          const script = document.createElement("script");
          if (el.src) {
            script.src = el.src;
            script.async = false;
          } else {
            script.textContent = el.textContent;
          }
          document.body.appendChild(script);
        } else {
          container.appendChild(el);
        }
      });
    }

    async function setupPage() {
      await injectHTML("/html/cartpopup.html", "cartPopup-placeholder");
      await injectHTML("/html/checkoutpopup.html", "checkoutPopup-placeholder");
      await injectHTML("/html/stickyfooter.html", "sticky-footer-placeholder");

      await loadScript("/js/voucherpopup.js");
      await loadScript("/js/cartpopup.js");
      await loadScript("/js/checkoutpopup.js?v=" + Date.now());

      setTimeout(async () => {
        const map = await fetchVoucherMap();
        window.__vouchersRaw = map[window.loai] || {};
        window.voucherByProduct = {};
        initCartPopup();
      }, 100);
    }

    setupPage();
  </script>

  <!-- ✅ Collection Grid Script (chỉ pickleball) -->
  <script>
    window.collectionList = [
      {
        title: "PICKLEBALL COLLECTION",
        json: "/json/pickleball-collection.json"
      }
    ];
  </script>
  <script src="/js/collection-grid.js?v=20260714-mobile-image-src-1" defer></script>

  <!-- ✅ Tracking -->
  <script src="/js/tracking.js"></script>
  <div id="base-placeholder"></div>
  <script>
    fetch("/html/base.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("base-placeholder").outerHTML = html;
        if (typeof trackBothPixels === "function") {
          trackBothPixels("ViewContent", {
            content_type: "product",
            contents: [{
              content_id: window.productPage,
              content_name: window.productPage,
              content_category: window.productCategory,
              quantity: 1,
              price: 0
            }],
            value: 0,
            currency: "VND"
          });
        }
      });
  </script>

  <!-- ✅ Base script -->
  <script src="/js/base.js"></script>
  <script src="/js/photo-gallery.js?v=20260701-lazy-images-1"></script>

</body>
</html>
