<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dép Chạy Bộ Carbon Đài Loan Ysandal B&M</title>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="/css/frontend.css?v=20260701-central-css-1" />
  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- ✅ JS định nghĩa -->
  <script>
    window.loai = "ysandal";
    window.productCategory = "ysandal";
    window.productPage = "carbon";
    window.imageCount = 8;
    window.imageFormat = "jpg";
    window.FSPORT_DISABLE_COLLECTION_GRID = true;
    window.shopeeLink = "https://s.shopee.vn/6fZ6bQnTs2"; // ✅ Khai báo Shopee link tại đầu
    window.FSPORT_CARTPOPUP_CONFIG_URL = "https://xcigbbcpwfzluqazadez.supabase.co/functions/v1/cart-popup-config";
    (function () {
      var slug = window.productPage || "carbon";
      fetch(window.FSPORT_CARTPOPUP_CONFIG_URL + "?slug=" + encodeURIComponent(slug))
        .then(function (res) {
          if (!res.ok) throw new Error("cart config " + res.status);
          return res.json();
        })
        .then(function (config) {
          if (!config || config.cartSchema !== "fsport-product-v1") return;
          window.__fsportProductPageConfig = config;
          if (config.title) document.title = config.title;
        })
        .catch(function () {
          window.__fsportProductPageConfig = null;
        });
    })();
  </script>
</head>

<body>
  <div class="page-container">
    <div id="cartPopup-placeholder"></div>
    <div id="checkoutPopup-placeholder"></div>
    <div id="sticky-footer-placeholder"></div>

    <!-- ✅ SLIDESHOW -->
    <div class="lazy-slideshow" id="lazySlideshow">
      <div class="slide-counter" id="slideCounter">1/1</div>
    </div>
    <div id="fullscreenZoom" style="display: none;">
      <div id="zoomWrapper">
        <img id="zoomedImg" src="" alt="Zoomed" />
        <button id="zoomCloseBtn">×</button>
      </div>
    </div>
    <script src="/js/slideshow-lazy-loader.js?v=20260701-1"></script>
    <script src="/js/slideshow-2p.js?v=20260701-lazy-sequential-1"></script>

    <!-- ✅ Flash Banner -->
    <div id="flashbanner-placeholder"></div>
    <script>
      fetch("/html/flashsalebanner/template01.html")
        .then(res => res.text())
        .then(html => {
          document.getElementById("flashbanner-placeholder").innerHTML = html;
          const s = document.createElement("script");
          s.src = "/js/flashsalebanner/template01.js";
          document.body.appendChild(s);
        });
    </script>

    <!-- ✅ Tiêu đề + Shipping -->
    <div class="product-hero">
      <h1 style="font-size: 14px; font-weight: bold; margin-top: 8px; font-family: 'Be Vietnam Pro', sans-serif;">
        <span style="background: black; color: white; font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-right: 4px;">Mall</span>
        <span style="background: #007BFF; color: white; font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-right: 6px; text-transform: uppercase;">Hàng Chính Hãng</span>
        Dép Chạy Bộ Carbon Đài Loan Ysandal B&M
      </h1>
      <div class="shipping-wrapper">
        <div class="shipping-info">
          <div class="shipping-line"><span class="icon">🚚</span>Ship từ Hà Nội – Giao Hàng Toàn Quốc, Nhận Hàng Trong Vòng 3 Ngày</div>
          <div class="shipping-line"><span class="icon">🔍</span>Kiểm Tra Hàng Trước Khi Thanh Toán</div>
        </div>
      </div>
    </div>

    <!-- ✅ VIDEO -->
    <div class="product-hero" style="margin-top: 12px;">
      <div id="video-placeholder">Đang tải video...</div>
    </div>
    <script>
      fetch("/html/productvideo.html")
        .then(res => res.text())
        .then(html => {
          document.getElementById("video-placeholder").innerHTML = html;
          const script = document.createElement("script");
          script.src = "/js/productvideo.js";
          script.onload = () => {
            if (typeof initProductVideo === "function") initProductVideo();
          };
          document.body.appendChild(script);
        })
        .catch(err => console.warn("❌ Lỗi khi chèn productvideo.html:", err));
    </script>

    <!-- ✅ Mô tả -->
    <div class="product-hero" style="margin-top: 12px;">
      <div id="productdescription-placeholder" data-src="/html/productdescription/ysandal/carbon"></div>
    </div>
    <script src="/js/productdescription.js"></script>

    <!-- ✅ KHỐI BUTTON -->
    <div class="product-hero" style="margin-top:12px;padding:0;">
      <style>
        .btn-block {
          display: flex;
          gap: 8px;
          margin-top: 8px;
          width: 100%;
          font-family: 'Be Vietnam Pro', sans-serif;
        }
        .btn-block .footer-btn {
          flex: 1;
          text-align: center;
          border: none;
          border-radius: 6px;
          font-weight: 600;
          font-size: 14px;
          padding: 10px 0;
          cursor: pointer;
          transition: opacity 0.2s ease;
        }
        .btn-block .footer-btn:hover { opacity: 0.85; }
        .btn-block .atc-btn { background: #e53935; color: #fff; }
        .btn-block .shopee-btn { background: #ff6600; color: #fff; text-decoration: none; display: inline-block; }
        .btn-note { text-align: center; font-size: 12px; color: #333; margin-top: 6px; font-family: 'Be Vietnam Pro', sans-serif; }
      </style>

      <div class="btn-block">
        <button class="footer-btn atc-btn" onclick="addToCart()">MUA TẠI WEBSITE</button>
        <button class="footer-btn shopee-btn" id="buyShopeeBtn">MUA TẠI SHOPEE</button>
      </div>
      <div class="btn-note">Mua Tại Website Rẻ Hơn Mua Tại Shopee</div>
    </div>
    <!-- ✅ FREEFLOW -->
    <h2 class="freeflow-heading" style="font-size: 18px; margin: 24px 12px 12px;">CÓ THỂ BẠN SẼ THÍCH</h2>
    <script src="/js/freeflow-loader.js"></script>
  </div>

  <!-- ✅ Inject popup -->
  <script>
    async function loadScript(src) {
      return new Promise(resolve => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        document.body.appendChild(s);
      });
    }

    async function injectHTML(file, placeholderId) {
      const res = await fetch(file);
      const html = await res.text();
      const container = document.getElementById(placeholderId);
      const temp = document.createElement("div");
      temp.innerHTML = html;

      Array.from(temp.children).forEach(el => {
        if (el.tagName === "SCRIPT") {
          const script = document.createElement("script");
          if (el.src) script.src = el.src;
          else script.textContent = el.textContent;
          document.body.appendChild(script);
        } else {
          container.appendChild(el);
        }
      });
    }

    async function setupPage() {
      await injectHTML("/html/cartpopup.html", "cartPopup-placeholder");
      await injectHTML("/html/checkoutpopup.html", "checkoutPopup-placeholder");
      await injectHTML("/html/stickyfooter.html", "sticky-footer-placeholder");

      await loadScript("../js/voucherpopup.js");
      await loadScript("/js/cartpopup.js");
      await loadScript("../js/checkoutpopup.js");

      setTimeout(async () => {
        const map = await fetchVoucherMap();
        window.__vouchersRaw = map[window.loai] || {};
        window.voucherByProduct = {};
        initCartPopup();
      }, 100);
    }
    setupPage();
  </script>

  <!-- ✅ Tracking -->
  <script src="../js/tracking.js"></script>
  <div id="base-placeholder"></div>
  <script>
    fetch("/html/base.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("base-placeholder").outerHTML = html;
        if (typeof trackBothPixels === "function") {
          trackBothPixels("ViewContent", {
            content_id: window.productPage,
            content_name: window.productPage,
            content_category: window.productCategory,
            value: 0,
            currency: "VND"
          });
        }
      });
  </script>

  <!-- ✅ OUTBOUND TRACKING -->
  <script src="/js/aff/outbound-click.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const btn = document.getElementById("buyShopeeBtn");
      if (btn) {
        btn.addEventListener("click", function (e) {
          e.preventDefault();
          if (typeof trackOutboundClick === "function") {
            trackOutboundClick();
          } else {
            console.warn("⚠️ outbound-click.js chưa load — mở trực tiếp Shopee");
            window.location.href = window.shopeeLink;
          }
        });
      }
    });
  </script>

  <!-- ✅ Base script -->
  <script src="/js/base.js"></script>
</body>
</html>
